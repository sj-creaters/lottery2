<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display 設定</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .nav-btn {
      display: block; text-align: center; margin: 10px 0;
      padding: 8px 16px; font-size: 16px; text-decoration: none;
      background-color: #007bff; color: white; border-radius: 4px;
      width: 200px; margin-left: auto; margin-right: auto;
    }
    h2, h3 { text-align: center; }
    .section { border: 1px solid #aaa; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input[type="text"], input[type="file"] { width: 100%; max-width: 400px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; font-size: 16px; margin-top: 8px; }
    hr { margin: 30px 0; }
    .image-option { display: inline-block; margin: 10px; text-align: center; border: 1px solid #ccc; padding: 5px; border-radius: 4px; }
    .thumb { max-width: 150px; display: block; margin: 5px auto; }
    .delete-btn { display: block; margin-top: 5px; padding: 4px 8px; font-size: 12px; background-color: red; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .upload-box { border: 2px dashed #aaa; border-radius: 8px; padding: 16px; margin-bottom: 12px; background: #fafafa; }
    .upload-btn { background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 8px 18px; font-size: 15px; margin-top: 8px; }
    .upload-btn:disabled { background-color: #aaa; cursor: not-allowed; }
    .progress-bar-wrap { width: 100%; max-width: 400px; background: #e0e0e0; border-radius: 4px; height: 10px; margin-top: 8px; display: none; }
    .progress-bar { height: 10px; background: #28a745; border-radius: 4px; width: 0%; transition: width 0.2s; }
    .upload-msg { font-size: 13px; margin-top: 6px; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 12px 0; color: #888; font-size: 13px; }
    .divider::before, .divider::after { content: ""; flex: 1; border-top: 1px solid #ccc; }
    .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .slider-row label { width: 120px; margin: 0; flex-shrink: 0; font-size: 14px; }
    .slider-row input[type="range"] { flex: 1; max-width: 260px; }
    .slider-val { width: 40px; text-align: right; font-weight: bold; font-size: 14px; color: #007bff; }
    .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 12px 0; }
    .preset-card { border: 3px solid transparent; border-radius: 10px; padding: 8px; cursor: pointer; text-align: center; background: #f5f5f5; transition: border-color 0.2s, transform 0.1s; user-select: none; }
    .preset-card:hover { transform: scale(1.03); }
    .preset-card.selected { border-color: #007bff; box-shadow: 0 0 6px rgba(0,120,255,0.4); }
    .preset-card .sample-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 6px; align-items: center; }
    .sample-tile { width: 30px; height: 18px; border-radius: 4px; border: 2px solid; font-size: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    .sample-btn { width: 28px; height: 28px; border-radius: 50%; font-size: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .preset-label { font-size: 12px; font-weight: bold; color: #333; margin-top: 4px; }
    .shape-btn { padding:6px 16px; border:2px solid #aaa; border-radius:6px; background:#fff; cursor:pointer; font-size:13px; margin-top:4px; }
    .shape-btn.selected { border-color:#007bff; background:#e8f0fe; color:#007bff; font-weight:bold; }
    .save-btn { background: #007bff; color: white; border: none; border-radius: 6px; padding: 10px 28px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    .save-btn:hover { background: #0056b3; }
    .save-msg { margin-top: 8px; font-size: 14px; color: green; }
  </style>
</head>
<body>

  <!-- ログインオーバーレイ -->
  <div id="loginOverlay" style="
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.8); display:flex;
    align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#fff; padding:30px; border-radius:8px; text-align:center; width:280px;">
      <h2 style="margin-bottom:16px;">表示設定</h2>
      <input type="password" id="passwordInput" placeholder="パスワードを入力"
        style="width:100%;padding:8px;font-size:16px;margin-bottom:12px;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter') document.getElementById('loginBtn').click()"
      /><br/>
      <button id="loginBtn" style="padding:10px 20px;font-size:16px;cursor:pointer;">開く</button>
      <div id="loginError" style="color:red;margin-top:10px;font-size:14px;"></div>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div id="mainContainer" style="display:none;">

    <a class="nav-btn" href="index.html">メイン画面に戻る</a>
    <h2>Display 設定</h2>

    <!-- 抽選画面レイアウト設定 -->
    <div class="section">
      <h3>🎰 抽選画面レイアウト設定</h3>

      <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">

        <!-- 左：スライダー＋プリセット -->
        <div style="flex:1; min-width:280px;">
          <div class="form-group">
            <strong>タイル表示エリア位置</strong>
            <div style="font-size:12px;color:#888;margin-bottom:8px;">※ スライダーを動かすと右のプレビューに即反映</div>
            <div class="slider-row">
              <label>タイル 上端</label>
              <input type="range" id="slTileTop" min="10" max="65" step="1" value="40">
              <span class="slider-val" id="valTileTop">40</span>%
              <div class="slider-row">
              <label>タイル 高さ</label>
              <input type="range" id="slTileHeight" min="28" max="80" step="1" value="40">
              <span class="slider-val" id="valTileHeight">40</span>px
            </div>
          </div>
          <div class="form-group">
            <strong>タイル 形状</strong>
            <div id="shapeSelector" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
              <button type="button" class="shape-btn" data-shape="rect">四角</button>
              <button type="button" class="shape-btn selected" data-shape="rounded">角丸</button>
              <button type="button" class="shape-btn" data-shape="pill">楕円</button>
              <button type="button" class="shape-btn" data-shape="circle">円</button>
            </div>
          </div>
            <div class="slider-row">
              <label>タイル 下端（余白）</label>
              <input type="range" id="slTileBottom" min="10" max="55" step="1" value="30">
              <span class="slider-val" id="valTileBottom">30</span>%
            </div>
            <div class="slider-row">
              <label>スタートボタン</label>
              <input type="range" id="slBtnBottom" min="5" max="50" step="1" value="25">
              <span class="slider-val" id="valBtnBottom">25</span>%
            </div>
          </div>
          <div class="form-group">
            <strong>タイル カラープリセット</strong>
            <div style="font-size:12px;color:#888;margin-bottom:8px;">※ クリックでプレビューに即反映</div>
            <div class="preset-grid" id="presetGrid"></div>
          </div>
        </div>

        <!-- 右：リアルタイムプレビュー -->
        <div style="flex:0 0 200px;">
          <strong style="display:block;margin-bottom:8px;font-size:14px;">📱 プレビュー</strong>
          <div id="preview" style="
            position:relative; width:200px; aspect-ratio:3/4;
            background:#333; border-radius:8px; overflow:hidden; border:2px solid #aaa;">
            <img id="previewBg" src="" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;top:0;left:0;">
            <div id="previewTiles" style="
              position:absolute; left:0; right:0;
              display:grid; gap:4px; padding:4px; box-sizing:border-box;
              grid-template-columns:repeat(3,1fr);
              align-items:center; justify-items:center;"></div>
            <div id="previewBtn" style="
              position:absolute; left:50%; transform:translateX(-50%);
              width:40px; height:40px; border-radius:50%;
              display:flex; align-items:center; justify-content:center;
              font-size:8px; font-weight:bold;">スタート</div>
          </div>
          <div style="font-size:11px;color:#888;margin-top:6px;text-align:center;">実際の画面と同じ比率</div>
        </div>

      </div>

      <button class="save-btn" id="layoutSaveBtn">💾 抽選画面設定を保存</button>
      <div class="save-msg" id="layoutSaveMsg"></div>
    </div>

    <hr>

    <!-- タイトル設定 -->
    <div class="section">
      <h3>タイトル設定</h3>
      <div id="currentTitle" style="margin-bottom:10px;">現在のタイトル: </div>
      <div class="form-group">
        <label for="titleInput">新しいタイトル</label>
        <input type="text" id="titleInput" placeholder="例：抽選会">
      </div>
      <button type="button" id="titleSaveBtn">タイトル登録</button>
      <div class="form-group" style="margin-top:20px;">
        <label>タイトル表示設定</label>
        <label><input type="radio" name="titleVisibility" value="true"> 表示</label>
        <label><input type="radio" name="titleVisibility" value="false"> 非表示</label>
      </div>
      <button type="button" id="titleVisibilitySaveBtn">タイトル表示設定更新</button>
    </div>

    <hr>

    <!-- 背景画像設定 -->
    <div class="section">
      <h3>背景画像設定</h3>
      <div class="upload-box">
        <label>📁 ファイルからアップロード</label>
        <div class="form-group"><input type="file" id="bgFileInput" accept="image/*"></div>
        <button type="button" class="upload-btn" id="bgUploadBtn">アップロード</button>
        <div class="progress-bar-wrap" id="bgProgressWrap"><div class="progress-bar" id="bgProgressBar"></div></div>
        <div class="upload-msg" id="bgUploadMsg"></div>
      </div>
      <div class="divider">または URL で登録</div>
      <div class="form-group">
        <label>画像URLを入力</label>
        <input type="text" id="bgUrlInput" placeholder="例：https://example.com/image.jpg">
      </div>
      <button type="button" id="bgAddBtn">背景画像登録</button>
      <div id="bgList" style="margin-top:16px;"></div>
      <button type="button" id="bgSelectBtn">選択して採用</button>
    </div>

    <!-- 中央画像設定 -->
    <div class="section">
      <h3>中央画像設定</h3>
      <div class="upload-box">
        <label>📁 ファイルからアップロード</label>
        <div class="form-group"><input type="file" id="centerFileInput" accept="image/*"></div>
        <button type="button" class="upload-btn" id="centerUploadBtn">アップロード</button>
        <div class="progress-bar-wrap" id="centerProgressWrap"><div class="progress-bar" id="centerProgressBar"></div></div>
        <div class="upload-msg" id="centerUploadMsg"></div>
      </div>
      <div class="divider">または URL で登録</div>
      <div class="form-group">
        <label>画像URLを入力</label>
        <input type="text" id="centerUrlInput" placeholder="例：https://example.com/image.jpg">
      </div>
      <button type="button" id="centerAddBtn">中央画像登録</button>
      <div id="centerList" style="margin-top:16px;"></div>
      <button type="button" id="centerSelectBtn">選択して採用</button>
    </div>

    <a class="nav-btn" href="index.html">メイン画面に戻る</a>

  </div><!-- /mainContainer -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/9.16.0/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, getDoc, collection,
      onSnapshot, addDoc, deleteDoc, query, orderBy, getDocs
    } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-firestore.js";
    import {
      getStorage, ref as sRef, uploadBytesResumable, getDownloadURL
    } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDggkQeswndbsRb0d0K8WOv2L3i6o4vh0",
      authDomain: "lottery2-e5aa1.firebaseapp.com",
      projectId: "lottery2-e5aa1",
      storageBucket: "lottery2-e5aa1.firebasestorage.app",
      messagingSenderId: "652760083315",
      appId: "1:652760083315:web:0a0e45eec343f403f2b306",
      measurementId: "G-D5H6XV6GHE"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const stor = getStorage(app);
    const configRef = doc(db, "displaySettings", "config");
    const STAFF_EMAIL = "mi3254@sendai-mitsukoshi.co.jp";

    // ── カラープリセット ──────────────────────────────────────────
    const PRESETS = [
      { id:'classic',  label:'クラシック', bg:'rgba(255,255,255,0.95)', color:'#222',  border:'#aaa',     aBg:'#FFD700', aBorder:'orange',   wBg:'magenta', wBorder:'red',     wColor:'white',   btnBg:'rgba(0,0,0,0.85)',  btnColor:'white', btnBorder:'none' },
      { id:'dark',     label:'ダーク',     bg:'rgba(0,0,0,0.82)',       color:'white', border:'#555',     aBg:'#FFD700', aBorder:'orange',   wBg:'#FF1493', wBorder:'red',     wColor:'white',   btnBg:'#111',              btnColor:'white', btnBorder:'2px solid #555' },
      { id:'gold',     label:'ゴールド',   bg:'#FFD700',                color:'#333',  border:'#B8860B',  aBg:'#FF8C00', aBorder:'#FF4500', wBg:'#DC143C', wBorder:'#8B0000', wColor:'white',   btnBg:'#FFD700',           btnColor:'#333',  btnBorder:'3px solid #B8860B' },
      { id:'navy',     label:'ネイビー',   bg:'#1a237e',                color:'white', border:'#3949ab',  aBg:'#00E5FF', aBorder:'#00ACC1', wBg:'#FFD700', wBorder:'#FFA000', wColor:'#222',    btnBg:'#0d1b6e',           btnColor:'white', btnBorder:'2px solid #5c6bc0' },
      { id:'frost',    label:'半透明白',   bg:'rgba(255,255,255,0.72)', color:'#111',  border:'rgba(255,255,255,0.5)', aBg:'rgba(255,230,0,0.92)', aBorder:'orange', wBg:'rgba(255,0,180,0.92)', wBorder:'red', wColor:'white', btnBg:'rgba(255,255,255,0.88)', btnColor:'#111', btnBorder:'2px solid rgba(0,0,0,0.25)' },
      { id:'frostd',   label:'半透明黒',   bg:'rgba(0,0,0,0.65)',       color:'white', border:'rgba(0,0,0,0.4)',       aBg:'rgba(255,220,0,0.92)', aBorder:'orange', wBg:'rgba(255,20,147,0.92)', wBorder:'red', wColor:'white', btnBg:'rgba(0,0,0,0.72)', btnColor:'white', btnBorder:'2px solid rgba(255,255,255,0.3)' },
      { id:'red',      label:'レッド',     bg:'#c62828',                color:'white', border:'#b71c1c',  aBg:'#FFD700', aBorder:'orange',   wBg:'white',   wBorder:'#c62828', wColor:'#c62828', btnBg:'#b71c1c',           btnColor:'white', btnBorder:'3px solid #7f0000' },
      { id:'emerald',  label:'エメラルド', bg:'#00695c',                color:'white', border:'#004d40',  aBg:'#FFEB3B', aBorder:'#F9A825', wBg:'#FF6F00', wBorder:'#E65100', wColor:'white',   btnBg:'#004d40',           btnColor:'white', btnBorder:'2px solid #00897b' },
    ];

    let selectedPresetId = 'classic';
    let selectedShape = 'rounded';

    const SHAPE_MAP = {
      rect:    { radius: '6px',  aspect: 'auto' },
      rounded: { radius: '16px', aspect: 'auto' },
      pill:    { radius: '50px', aspect: 'auto' },
      circle:  { radius: '50%',  aspect: '1'    },
    };

    // ── 認証 ─────────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
        initPage();
      }
    });
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const pw  = document.getElementById("passwordInput").value;
      const err = document.getElementById("loginError");
      err.textContent = "";
      try {
        await signInWithEmailAndPassword(auth, STAFF_EMAIL, pw);
      } catch(e) { err.textContent = "パスワードが違います"; }
    });

    // ── ページ初期化 ──────────────────────────────────────────────
    async function initPage() {
      buildPresetGrid();
      setupSliders();
      await loadConfig();
      setupImageLists();
    }

    // ── スライダー設定 ────────────────────────────────────────────
    function setupSliders() {
      ["TileTop","TileBottom","BtnBottom"].forEach(k => {
        const sl = document.getElementById("sl"+k);
        const val = document.getElementById("val"+k);
        sl.addEventListener("input", () => { val.textContent = sl.value; updatePreview(); });
      });
    }

    // ── プリセットグリッド構築 ────────────────────────────────────
    function buildPresetGrid() {
      const grid = document.getElementById("presetGrid");
      PRESETS.forEach(p => {
        const card = document.createElement("div");
        card.className = "preset-card"; card.dataset.id = p.id;
        const row = document.createElement("div"); row.className = "sample-row";
        [
          { bg:p.bg,  color:p.color,  border:p.border,  text:'賞' },
          { bg:p.aBg, color:'#333',   border:p.aBorder, text:'▶'  },
          { bg:p.wBg, color:p.wColor, border:p.wBorder, text:'★'  },
        ].forEach(s => {
          const t = document.createElement("div"); t.className = "sample-tile";
          t.style.background = s.bg; t.style.color = s.color; t.style.borderColor = s.border;
          t.textContent = s.text; row.appendChild(t);
        });
        const btn = document.createElement("div"); btn.className = "sample-btn";
        btn.style.background = p.btnBg; btn.style.color = p.btnColor;
        btn.style.border = p.btnBorder || "none"; btn.textContent = "GO";
        row.appendChild(btn); card.appendChild(row);
        const lbl = document.createElement("div"); lbl.className = "preset-label";
        lbl.textContent = p.label; card.appendChild(lbl);
        card.addEventListener("click", () => {
          document.querySelectorAll(".preset-card").forEach(c => c.classList.remove("selected"));
          card.classList.add("selected"); selectedPresetId = p.id;
          updatePreview();
        });
        grid.appendChild(card);
      });
    }

    // ── プレビュー更新 ────────────────────────────────────────────
    function updatePreview() {
      const top    = Number(document.getElementById("slTileTop").value);
      const bottom = Number(document.getElementById("slTileBottom").value);
      const btn    = Number(document.getElementById("slBtnBottom").value);
      const p      = PRESETS.find(x => x.id === selectedPresetId) || PRESETS[0];
      const tiles  = document.getElementById("previewTiles");
      tiles.style.top    = top + "%";
      tiles.style.bottom = bottom + "%";
      Array.from(tiles.children).forEach(t => {
        t.style.background  = p.bg;
        t.style.color       = p.color;
        t.style.borderColor = p.border;
      });
      const previewBtn = document.getElementById("previewBtn");
      previewBtn.style.bottom     = btn + "%";
      previewBtn.style.background = p.btnBg;
      previewBtn.style.color      = p.btnColor;
      previewBtn.style.border     = p.btnBorder || "none";
    }

    function buildPreviewTiles(names) {
      const tiles = document.getElementById("previewTiles");
      tiles.innerHTML = "";
      tiles.style.gridTemplateColumns = `repeat(${Math.min(names.length,3)}, 1fr)`;
      names.forEach(name => {
        const t = document.createElement("div");
        t.style.cssText = "width:97%;height:14px;border-radius:3px;border:1px solid #aaa;font-size:7px;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;box-sizing:border-box;";
        t.textContent = name;
        tiles.appendChild(t);
      });
      updatePreview();
    }

    // ── 設定読み込み ──────────────────────────────────────────────
    async function loadConfig() {
      const snap = await getDoc(configRef);
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById("currentTitle").textContent = "現在のタイトル: " + (d.title || "");
        document.getElementsByName("titleVisibility").forEach(r => {
          r.checked = (r.value === String(d.titleVisible ?? true));
        });
        if (d.tileTop    != null) { document.getElementById("slTileTop").value    = d.tileTop;    document.getElementById("valTileTop").textContent    = d.tileTop; }
        if (d.tileBottom != null) { document.getElementById("slTileBottom").value = d.tileBottom; document.getElementById("valTileBottom").textContent = d.tileBottom; }
        if (d.btnBottom  != null) { document.getElementById("slBtnBottom").value  = d.btnBottom;  document.getElementById("valBtnBottom").textContent  = d.btnBottom; }
        if (d.tileHeight != null) { document.getElementById("slTileHeight").value = d.tileHeight; document.getElementById("valTileHeight").textContent = d.tileHeight; }
        if (d.tileShape) {
          selectedShape = d.tileShape;
          document.querySelectorAll(".shape-btn").forEach(b => b.classList.toggle("selected", b.dataset.shape === d.tileShape));
          document.getElementById("slTileHeight").disabled = d.tileShape === 'circle';
        }
        if (d.colorPreset) {
          selectedPresetId = d.colorPreset;
          document.querySelectorAll(".preset-card").forEach(c => c.classList.toggle("selected", c.dataset.id === d.colorPreset));
        } else {
          document.querySelector(".preset-card")?.classList.add("selected");
        }
        if (d.currentCenterImageUrl) {
          document.getElementById("previewBg").src = d.currentCenterImageUrl;
        }
      }
      // 賞名をプレビューに表示
      try {
        const prizesSnap = await getDocs(query(collection(db,"prizes"), orderBy("rank","asc")));
        const names = prizesSnap.docs.map(d => d.data().name).slice(0,6);
        buildPreviewTiles(names.length ? names : ["1等","2等","3等","4等","5等"]);
      } catch(e) {
        buildPreviewTiles(["1等","2等","3等","4等","5等"]);
      }
    }

    // ── レイアウト保存 ────────────────────────────────────────────
    document.getElementById("layoutSaveBtn").addEventListener("click", async () => {
      const msg = document.getElementById("layoutSaveMsg");
      try {
        await setDoc(configRef, {
          tileTop:     Number(document.getElementById("slTileTop").value),
          tileBottom:  Number(document.getElementById("slTileBottom").value),
          btnBottom:   Number(document.getElementById("slBtnBottom").value),
          tileHeight:  Number(document.getElementById("slTileHeight").value),
          tileShape:   selectedShape,
          colorPreset: selectedPresetId,
          updatedAt:   new Date()
        }, { merge: true });
        msg.style.color = "green";
        msg.textContent = "✅ 保存しました！抽選画面に反映されます。";
        setTimeout(() => msg.textContent = "", 3000);
      } catch(e) {
        msg.style.color = "red";
        msg.textContent = "❌ 保存エラー: " + e.message;
      }
    });

    // ── タイトル ──────────────────────────────────────────────────
    document.getElementById("titleSaveBtn").addEventListener("click", async () => {
      await setDoc(configRef, { title: document.getElementById("titleInput").value.trim(), updatedAt: new Date() }, { merge: true });
      alert("タイトルが更新されました。"); loadConfig();
    });
    document.getElementById("titleVisibilitySaveBtn").addEventListener("click", async () => {
      const sel = document.querySelector('input[name="titleVisibility"]:checked');
      if (!sel) { alert("選択してください。"); return; }
      await setDoc(configRef, { titleVisible: sel.value === "true", updatedAt: new Date() }, { merge: true });
      alert("タイトル表示設定が更新されました。"); loadConfig();
    });

    // ── 画像アップロード ──────────────────────────────────────────
    async function uploadFile(file, folder, fsCol, barId, wrapId, msgId, btnId) {
      const btn=document.getElementById(btnId), bar=document.getElementById(barId);
      const wrap=document.getElementById(wrapId), msg=document.getElementById(msgId);
      btn.disabled=true; wrap.style.display="block"; msg.textContent="アップロード中…"; msg.style.color="#333";
      try {
        const task = uploadBytesResumable(sRef(stor,`lottery/${folder}/${Date.now()}_${file.name}`), file);
        await new Promise((res,rej) => task.on("state_changed",
          s => { bar.style.width=Math.round(s.bytesTransferred/s.totalBytes*100)+"%"; }, rej, res));
        const url = await getDownloadURL(task.snapshot.ref);
        await addDoc(collection(db,fsCol), { url, createdAt: new Date() });
        msg.textContent="✅ アップロード完了！"; msg.style.color="green";
      } catch(e) { msg.textContent="❌ エラー: "+e.message; msg.style.color="red"; }
      finally { btn.disabled=false; setTimeout(()=>{ wrap.style.display="none"; bar.style.width="0%"; },2000); }
    }
    document.getElementById("bgUploadBtn").addEventListener("click", () => {
      const f=document.getElementById("bgFileInput").files[0];
      if (!f) { alert("ファイルを選択してください。"); return; }
      uploadFile(f,"bgImages","displayBgImages","bgProgressBar","bgProgressWrap","bgUploadMsg","bgUploadBtn");
    });
    document.getElementById("centerUploadBtn").addEventListener("click", () => {
      const f=document.getElementById("centerFileInput").files[0];
      if (!f) { alert("ファイルを選択してください。"); return; }
      uploadFile(f,"centerImages","displayCenterImages","centerProgressBar","centerProgressWrap","centerUploadMsg","centerUploadBtn");
    });

    // ── URL登録 ───────────────────────────────────────────────────
    document.getElementById("bgAddBtn").addEventListener("click", async () => {
      const url=document.getElementById("bgUrlInput").value.trim();
      if (!url) { alert("URLを入力してください。"); return; }
      await addDoc(collection(db,"displayBgImages"),{url,createdAt:new Date()});
      document.getElementById("bgUrlInput").value="";
    });
    document.getElementById("centerAddBtn").addEventListener("click", async () => {
      const url=document.getElementById("centerUrlInput").value.trim();
      if (!url) { alert("URLを入力してください。"); return; }
      await addDoc(collection(db,"displayCenterImages"),{url,createdAt:new Date()});
      document.getElementById("centerUrlInput").value="";
    });

    // ── 画像一覧 ──────────────────────────────────────────────────
    let currentBgUrl="", currentCenterUrl="";

    function renderList(snapshot, containerId, radioName, currentUrl, fsCol) {
      const div=document.getElementById(containerId); div.innerHTML="";
      snapshot.forEach(s => {
        const d=s.data(), c=document.createElement("div"); c.className="image-option";
        const r=document.createElement("input"); r.type="radio"; r.name=radioName; r.value=s.id;
        if (d.url===currentUrl) r.checked=true; c.appendChild(r);
        const img=document.createElement("img"); img.src=d.url; img.className="thumb"; c.appendChild(img);
        const del=document.createElement("button"); del.textContent="削除"; del.className="delete-btn";
        del.addEventListener("click", async()=>{ if(confirm("削除しますか？")) await deleteDoc(doc(db,fsCol,s.id)); });
        c.appendChild(del); div.appendChild(c);
      });
    }

    async function selectImage(radioName, fsCol, configKey) {
      const sel=document.querySelector(`input[name="${radioName}"]:checked`);
      if (!sel) { alert("画像を選択してください。"); return; }
      const snap=await getDoc(doc(db,fsCol,sel.value));
      if (snap.exists()) {
        await setDoc(configRef,{[configKey]:snap.data().url,updatedAt:new Date()},{merge:true});
        alert("画像が更新されました。");
        if (configKey==="currentCenterImageUrl") {
          document.getElementById("previewBg").src = snap.data().url;
        }
      }
    }

    function setupImageLists() {
      getDoc(configRef).then(s => {
        if (s.exists()) {
          currentBgUrl    = s.data().currentBgImageUrl    || "";
          currentCenterUrl= s.data().currentCenterImageUrl|| "";
        }
      });
      onSnapshot(collection(db,"displayBgImages"),     s=>renderList(s,"bgList",    "bgSelection",    currentBgUrl,    "displayBgImages"));
      onSnapshot(collection(db,"displayCenterImages"), s=>renderList(s,"centerList","centerSelection",currentCenterUrl,"displayCenterImages"));
      document.getElementById("bgSelectBtn").addEventListener("click",     ()=>selectImage("bgSelection",    "displayBgImages",    "currentBgImageUrl"));
      document.getElementById("centerSelectBtn").addEventListener("click", ()=>selectImage("centerSelection","displayCenterImages","currentCenterImageUrl"));
    }
  </script>
</body>
</html>
