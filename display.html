<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メイン画面</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .nav-buttons { text-align: center; margin: 10px 0; }
    .nav-buttons a {
      display: inline-block; padding: 8px 16px; margin: 5px;
      background-color: #007bff; color: #fff;
      text-decoration: none; border-radius: 4px;
    }
    table { width: 100%; max-width: 800px; margin: 20px auto; border-collapse: collapse; }
    th, td { border: 1px solid #aaa; padding: 8px; text-align: center; }
    th { background-color: #f0f0f0; }
    .total { font-weight: bold; margin-top: 20px; text-align: center; }
    .update-btn { padding: 4px 8px; font-size: 14px; }
    .correction-input { width: 60px; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 4px; }
  </style>
</head>
<body>

  <!-- ログインオーバーレイ -->
  <div id="loginOverlay" style="
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.8); display:flex;
    align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#fff; padding:30px; border-radius:8px; text-align:center; width:280px;">
      <h2 style="margin-bottom:16px;">抽選アプリ</h2>
      <input type="password" id="passwordInput" placeholder="パスワードを入力"
        style="width:100%;padding:8px;font-size:16px;margin-bottom:12px;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter') document.getElementById('loginBtn').click()"
      /><br/>
      <button id="loginBtn" style="padding:10px 20px;font-size:16px;cursor:pointer;">開く</button>
      <div id="loginError" style="color:red;margin-top:10px;font-size:14px;"></div>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div id="mainContainer" style="display:none;">
    <div class="nav-buttons">
      <a href="lottery.html">抽選画面</a>
      <a href="control.html">賞設定</a>
      <a href="display.html">表示設定</a>
      <a href="history.html">抽選履歴</a>
    </div>

    <h2 style="text-align:center;">現在の各賞情報</h2>

    <table id="prizesTable">
      <thead>
        <tr>
          <th>賞番号</th><th>賞名称</th><th>出た数</th>
          <th>残数</th><th>修正数</th><th>更新</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="total" id="totalRemaining">合計残数: 0</div>

    <div class="nav-buttons">
      <a href="lottery.html">抽選画面</a>
      <a href="control.html">賞設定</a>
      <a href="display.html">表示設定</a>
      <a href="history.html">抽選履歴</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/9.16.0/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, onSnapshot,
      updateDoc, doc
    } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDggkQeswndbsRb0d0K8WOv2L3i6o4vh0",
      authDomain: "lottery2-e5aa1.firebaseapp.com",
      projectId: "lottery2-e5aa1",
      storageBucket: "lottery2-e5aa1.firebasestorage.app",
      messagingSenderId: "652760083315",
      appId: "1:652760083315:web:0a0e45eec343f403f2b306",
      measurementId: "G-D5H6XV6GHE"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── 認証状態を監視：ログイン済みなら即座に画面を表示 ──────
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
      }
    });

    // ── ログインボタン ────────────────────────────────────────
    const STAFF_EMAIL = "mi3254@sendai-mitsukoshi.co.jp";

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const password = document.getElementById("passwordInput").value;
      const errDiv   = document.getElementById("loginError");
      errDiv.textContent = "";
      try {
        await signInWithEmailAndPassword(auth, STAFF_EMAIL, password);
        // onAuthStateChanged が自動的に画面を切り替える
      } catch(e) {
        errDiv.textContent = "パスワードが違います";
      }
    });

    // ── 賞情報テーブル ────────────────────────────────────────
    let prizesData = [], historyData = [];

    const prizesQuery = query(collection(db, "prizes"), orderBy("rank", "asc"));
    onSnapshot(prizesQuery, snapshot => {
      prizesData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      updateTable();
    });

    onSnapshot(collection(db, "history"), snapshot => {
      historyData = snapshot.docs.map(d => d.data());
      updateTable();
    });

    function updateTable() {
      const tbody = document.querySelector("#prizesTable tbody");
      tbody.innerHTML = "";
      let totalRemaining = 0;

      prizesData.forEach(prize => {
        const drawnCount = historyData.filter(h => h.prizeId === prize.id).length;
        const remaining  = prize.quantity - drawnCount;
        totalRemaining  += remaining;

        const tr = document.createElement("tr");

        // 賞番号
        const tdRank = document.createElement("td");
        tdRank.textContent = prize.rank;
        tr.appendChild(tdRank);

        // 賞名称（編集可）
        const tdName = document.createElement("td");
        const nameInput = document.createElement("input");
        nameInput.type = "text"; nameInput.value = prize.name;
        tdName.appendChild(nameInput);
        tr.appendChild(tdName);

        // 出た数
        const tdDrawn = document.createElement("td");
        tdDrawn.textContent = drawnCount;
        tr.appendChild(tdDrawn);

        // 残数
        const tdRem = document.createElement("td");
        tdRem.textContent = remaining;
        tr.appendChild(tdRem);

        // 修正数
        const tdCorr = document.createElement("td");
        const corrInput = document.createElement("input");
        corrInput.type = "number"; corrInput.className = "correction-input";
        corrInput.placeholder = ""; corrInput.min = "0";
        tdCorr.appendChild(corrInput);
        tr.appendChild(tdCorr);

        // 更新ボタン
        const tdBtn = document.createElement("td");
        const btn   = document.createElement("button");
        btn.textContent = "更新"; btn.className = "update-btn";
        btn.addEventListener("click", async () => {
          const newName = nameInput.value.trim();
          const val     = corrInput.value.trim();
          if (val === "") { alert("修正数を入力してください。"); return; }
          const newRem  = Number(val);
          if (newRem < 0) { alert("マイナスの数値は入力できません。"); return; }
          await updateDoc(doc(db, "prizes", prize.id), {
            name: newName, quantity: drawnCount + newRem
          });
          alert(`賞「${newName}」が更新されました。`);
          corrInput.value = "";
        });
        tdBtn.appendChild(btn);
        tr.appendChild(tdBtn);

        tbody.appendChild(tr);
      });

      document.getElementById("totalRemaining").textContent = "合計残数: " + totalRemaining;
    }
  </script>
</body>
</html>
