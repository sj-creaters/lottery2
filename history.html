<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抽選履歴</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { text-align: center; }
    .nav-btn {
      display: block; text-align: center; margin: 10px 0;
      padding: 8px 16px; font-size: 16px; text-decoration: none;
      background-color: #007bff; color: white; border-radius: 4px;
      width: 200px; margin-left: auto; margin-right: auto;
    }
    table { border-collapse: collapse; width: 100%; max-width: 600px; margin: 0 auto; }
    th, td { border: 1px solid #aaa; padding: 8px; text-align: center; }
    th { background-color: #f0f0f0; }
  </style>
</head>
<body>

  <!-- ログインオーバーレイ -->
  <div id="loginOverlay" style="
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.8); display:flex;
    align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#fff; padding:30px; border-radius:8px; text-align:center; width:280px;">
      <h2 style="margin-bottom:16px;">抽選履歴</h2>
      <input type="password" id="passwordInput" placeholder="パスワードを入力"
        style="width:100%;padding:8px;font-size:16px;margin-bottom:12px;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter') document.getElementById('loginBtn').click()"
      /><br/>
      <button id="loginBtn" style="padding:10px 20px;font-size:16px;cursor:pointer;">開く</button>
      <div id="loginError" style="color:red;margin-top:10px;font-size:14px;"></div>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div id="mainContainer" style="display:none;">
    <a class="nav-btn" href="index.html">メイン画面に戻る</a>

    <h2>抽選履歴</h2>

    <table id="historyTable">
      <thead>
        <tr>
          <th>賞名称</th>
          <th>日付</th>
          <th>時間</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <a class="nav-btn" href="index.html" style="margin-top:20px;">メイン画面に戻る</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/9.16.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, onSnapshot }
      from "https://www.gstatic.com/firebasejs/9.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDggkQeswndbsRb0d0K8WOv2L3i6o4vh0",
      authDomain: "lottery2-e5aa1.firebaseapp.com",
      projectId: "lottery2-e5aa1",
      storageBucket: "lottery2-e5aa1.firebasestorage.app",
      messagingSenderId: "652760083315",
      appId: "1:652760083315:web:0a0e45eec343f403f2b306",
      measurementId: "G-D5H6XV6GHE"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const STAFF_EMAIL = "mi3254@sendai-mitsukoshi.co.jp";

    // ── 認証状態を監視 ────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
      }
    });

    // ── ログインボタン ────────────────────────────────────────
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const password = document.getElementById("passwordInput").value;
      const errDiv   = document.getElementById("loginError");
      errDiv.textContent = "";
      try {
        await signInWithEmailAndPassword(auth, STAFF_EMAIL, password);
      } catch(e) {
        errDiv.textContent = "パスワードが違います";
      }
    });

    // ── 履歴リアルタイム表示 ─────────────────────────────────
    const tbody = document.querySelector("#historyTable tbody");
    onSnapshot(
      query(collection(db, "history"), orderBy("timestamp", "desc")),
      snapshot => {
        tbody.innerHTML = "";
        snapshot.forEach(s => {
          const d = s.data();
          const dateObj = d.timestamp?.toDate ? d.timestamp.toDate() : new Date(d.timestamp);
          const tr = document.createElement("tr");
          [d.prizeName || "", dateObj.toLocaleDateString(), dateObj.toLocaleTimeString()]
            .forEach(text => {
              const td = document.createElement("td");
              td.textContent = text;
              tr.appendChild(td);
            });
          tbody.appendChild(tr);
        });
      },
      err => console.error("履歴取得エラー:", err)
    );
  </script>
</body>
</html>
