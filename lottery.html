<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抽選アニメーション</title>
  <style>
    body { margin: 0; padding: 0; }
    #pageTitle {
      text-align: center; font-size: 28px; margin: 20px 0;
      background-color: rgba(0,0,0,0.7); color: white; padding: 10px;
    }
    .center-container {
      position: relative; margin: 0 auto;
      max-width: 600px; width: 100%;
      aspect-ratio: 3 / 4; overflow: hidden; background: #000;
    }
    #centerImage {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center; display: block;
    }
    .prizes-overlay {
      position: absolute; left: 0; right: 0;
      display: grid; gap: 10px; pointer-events: none;
      padding: 10px; box-sizing: border-box;
      grid-template-columns: repeat(3, 1fr);
      justify-items: center; align-items: center;
    }
    .tile {
      width: 97%; height: 40px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 10px;
      border: 2px solid var(--tile-border, #aaa);
      font-size: 14px; font-family: 'Arial Black', Gadget, sans-serif;
      font-weight: bold; border-radius: 8px;
      background-color: var(--tile-bg, rgba(255,255,255,0.95));
      color: var(--tile-color, #333);
      box-sizing: border-box; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; text-align: center;
      transition: background-color 0.15s;
    }
    .active {
      background-color: var(--active-bg,    yellow)  !important;
      border-color:     var(--active-border, orange)  !important;
      color:            var(--active-color,  #333)    !important;
    }
    .winner {
      background-color: var(--winner-bg,    magenta) !important;
      border-color:     var(--winner-border, red)     !important;
      color:            var(--winner-color,  white)   !important;
    }
    .start-btn {
      position: absolute; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--btn-bg, rgba(0,0,0,0.85));
      color: var(--btn-color, white);
      border: var(--btn-border, none);
      box-shadow: var(--btn-shadow, 0 3px 10px rgba(0,0,0,0.5));
      font-size: 18px; font-weight: bold;
      cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .start-btn:active { transform: translateX(-50%) scale(0.93); }
    #resultMessage { text-align: center; font-size: 20px; margin-top: 10px; }
    @media (max-width: 480px) {
      .tile { font-size: 12px; }
      .start-btn { width: 70px; height: 70px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="pageTitle"></div>

  <!-- ログインオーバーレイ -->
  <div id="loginOverlay" style="
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.8); display:flex;
    align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#fff; padding:30px; border-radius:8px; text-align:center; width:280px;">
      <h2 style="margin-bottom:16px;">抽選画面</h2>
      <input type="password" id="passwordInput" placeholder="パスワードを入力"
        style="width:100%;padding:8px;font-size:16px;margin-bottom:12px;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter') document.getElementById('loginBtn').click()"
      /><br/>
      <button id="loginBtn" style="padding:10px 20px;font-size:16px;cursor:pointer;">開く</button>
      <div id="loginError" style="color:red;margin-top:10px;font-size:14px;"></div>
    </div>
  </div>

  <div id="mainContainer" style="display:none;">
    <div class="center-container">
      <img id="centerImage" src="" alt="中央画像" />
      <div id="tilesOverlay" class="prizes-overlay"></div>
      <button id="startBtn" class="start-btn">スタート</button>
    </div>
    <div id="resultMessage"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/9.16.0/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, onSnapshot,
      doc, getDoc, getDocs, addDoc
    } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDggkQeswndbsRb0d0K8WOv2L3i6o4vh0",
      authDomain: "lottery2-e5aa1.firebaseapp.com",
      projectId: "lottery2-e5aa1",
      storageBucket: "lottery2-e5aa1.firebasestorage.app",
      messagingSenderId: "652760083315",
      appId: "1:652760083315:web:0a0e45eec343f403f2b306",
      measurementId: "G-D5H6XV6GHE"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const STAFF_EMAIL = "mi3254@sendai-mitsukoshi.co.jp";

    // ── 認証状態を監視 ────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
        loadDisplayConfig();
      }
    });

    // ── ログインボタン ────────────────────────────────────────
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const password = document.getElementById("passwordInput").value;
      const errDiv   = document.getElementById("loginError");
      errDiv.textContent = "";
      try {
        await signInWithEmailAndPassword(auth, STAFF_EMAIL, password);
      } catch(e) {
        errDiv.textContent = "パスワードが違います";
      }
    });

    // ── カラープリセット ──────────────────────────────────────
    const PRESETS = [
      { id:'classic',  bg:'rgba(255,255,255,0.95)', color:'#222',  border:'#aaa',     aBg:'#FFD700', aBorder:'orange',   aColor:'#222',  wBg:'magenta',              wBorder:'red',     wColor:'white', btnBg:'rgba(0,0,0,0.85)',          btnColor:'white', btnBorder:'none',                         btnShadow:'0 3px 10px rgba(0,0,0,0.5)' },
      { id:'dark',     bg:'rgba(0,0,0,0.82)',       color:'white', border:'#555',     aBg:'#FFD700', aBorder:'orange',   aColor:'#222',  wBg:'#FF1493',              wBorder:'red',     wColor:'white', btnBg:'#111',                      btnColor:'white', btnBorder:'2px solid #555',               btnShadow:'0 0 12px rgba(255,255,255,0.15)' },
      { id:'gold',     bg:'#FFD700',                color:'#333',  border:'#B8860B',  aBg:'#FF8C00', aBorder:'#FF4500', aColor:'white', wBg:'#DC143C',              wBorder:'#8B0000', wColor:'white', btnBg:'linear-gradient(135deg,#FFD700,#FFA000)', btnColor:'#333', btnBorder:'3px solid #B8860B', btnShadow:'0 3px 12px rgba(180,120,0,0.6)' },
      { id:'navy',     bg:'#1a237e',                color:'white', border:'#3949ab',  aBg:'#00E5FF', aBorder:'#00ACC1', aColor:'#111',  wBg:'#FFD700',              wBorder:'#FFA000', wColor:'#222',  btnBg:'#0d1b6e',                   btnColor:'white', btnBorder:'2px solid #5c6bc0',            btnShadow:'0 3px 12px rgba(0,0,80,0.5)' },
      { id:'frost',    bg:'rgba(255,255,255,0.72)', color:'#111',  border:'rgba(255,255,255,0.5)', aBg:'rgba(255,230,0,0.92)', aBorder:'orange', aColor:'#222', wBg:'rgba(255,0,180,0.92)', wBorder:'red', wColor:'white', btnBg:'rgba(255,255,255,0.88)', btnColor:'#111', btnBorder:'2px solid rgba(0,0,0,0.25)', btnShadow:'0 3px 10px rgba(0,0,0,0.2)' },
      { id:'frostd',   bg:'rgba(0,0,0,0.65)',       color:'white', border:'rgba(0,0,0,0.4)',       aBg:'rgba(255,220,0,0.92)', aBorder:'orange', aColor:'#222', wBg:'rgba(255,20,147,0.92)', wBorder:'red', wColor:'white', btnBg:'rgba(0,0,0,0.72)', btnColor:'white', btnBorder:'2px solid rgba(255,255,255,0.3)', btnShadow:'0 3px 10px rgba(0,0,0,0.5)' },
      { id:'red',      bg:'#c62828',                color:'white', border:'#b71c1c',  aBg:'#FFD700', aBorder:'orange',   aColor:'#222',  wBg:'white',                wBorder:'#c62828', wColor:'#c62828', btnBg:'#b71c1c',                btnColor:'white', btnBorder:'3px solid #7f0000',            btnShadow:'0 3px 12px rgba(180,0,0,0.6)' },
      { id:'emerald',  bg:'#00695c',                color:'white', border:'#004d40',  aBg:'#FFEB3B', aBorder:'#F9A825', aColor:'#222',  wBg:'#FF6F00',              wBorder:'#E65100', wColor:'white', btnBg:'#004d40',                   btnColor:'white', btnBorder:'2px solid #00897b',            btnShadow:'0 3px 12px rgba(0,80,60,0.5)' },
    ];

    function applyPreset(id) {
      const p = PRESETS.find(x => x.id === id) || PRESETS[0];
      const r = document.documentElement.style;
      r.setProperty('--tile-bg',      p.bg);
      r.setProperty('--tile-color',   p.color);
      r.setProperty('--tile-border',  p.border);
      r.setProperty('--active-bg',    p.aBg);
      r.setProperty('--active-border',p.aBorder);
      r.setProperty('--active-color', p.aColor);
      r.setProperty('--winner-bg',    p.wBg);
      r.setProperty('--winner-border',p.wBorder);
      r.setProperty('--winner-color', p.wColor);
      r.setProperty('--btn-bg',       p.btnBg);
      r.setProperty('--btn-color',    p.btnColor);
      r.setProperty('--btn-border',   p.btnBorder);
      r.setProperty('--btn-shadow',   p.btnShadow);
    }

    // ── 表示設定読み込み ──────────────────────────────────────
    async function loadDisplayConfig() {
      const snap = await getDoc(doc(db, "displaySettings", "config"));
      if (!snap.exists()) return;
      const d = snap.data();
      const titleElem = document.getElementById("pageTitle");
      if (d.titleVisible !== false && d.title) {
        titleElem.textContent = d.title; titleElem.style.display = "block";
      } else { titleElem.style.display = "none"; }
      if (d.currentBgImageUrl) {
        document.body.style.backgroundImage = `url('${d.currentBgImageUrl}')`;
        document.body.style.backgroundRepeat = "repeat";
      }
      document.getElementById("centerImage").src = d.currentCenterImageUrl || "";
      const ov = document.getElementById("tilesOverlay");
      ov.style.top    = (d.tileTop    ?? 40) + "%";
      ov.style.bottom = (d.tileBottom ?? 30) + "%";
      document.getElementById("startBtn").style.bottom = (d.btnBottom ?? 25) + "%";
      applyPreset(d.colorPreset || "classic");
    }

    // ── 賞タイル ─────────────────────────────────────────────
    const tilesOverlay = document.getElementById("tilesOverlay");
    let prizesList = [];
    onSnapshot(query(collection(db, "prizes"), orderBy("rank", "asc")), snapshot => {
      prizesList = [];
      tilesOverlay.innerHTML = "";
      snapshot.forEach(s => prizesList.push({ id: s.id, ...s.data() }));
      tilesOverlay.style.gridTemplateColumns = `repeat(${Math.min(prizesList.length,3)}, 1fr)`;
      prizesList.forEach(prize => {
        const tile = document.createElement("div");
        tile.className = "tile"; tile.textContent = prize.name; tile.dataset.id = prize.id;
        tilesOverlay.appendChild(tile);
      });
    });

    // ── ビープ音 ─────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep() {
      if (audioCtx.state === "suspended") audioCtx.resume();
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = "square";
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // ── 抽選ロジック ──────────────────────────────────────────
    let currentDelay = 100, deceleration = 20, timerId;
    let prevIndex = -1, preselectedWinner = null, startTime = 0;

    async function preselectWinner() {
      const histSnap = await getDocs(collection(db, "history"));
      const counts = {};
      histSnap.forEach(s => { const id = s.data().prizeId; counts[id] = (counts[id]||0)+1; });
      const weighted = []; let total = 0;
      prizesList.forEach(prize => {
        const rem = prize.quantity - (counts[prize.id]||0);
        if (rem > 0) { weighted.push({ prize, weight: rem }); total += rem; }
      });
      if (total <= 0) { preselectedWinner = null; return; }
      let r = Math.random() * total;
      for (const item of weighted) { r -= item.weight; if (r <= 0) { preselectedWinner = item.prize; break; } }
    }

    function clearActive() { document.querySelectorAll(".tile").forEach(t => t.classList.remove("active","winner")); }
    function randIdx(max, excl) { let i; do { i = Math.floor(Math.random()*max); } while (i===excl); return i; }

    function animate() {
      const tiles = document.querySelectorAll(".tile");
      if (!tiles.length) return;
      clearActive();
      const idx = randIdx(tiles.length, prevIndex);
      tiles[idx].classList.add("active"); prevIndex = idx; beep();
      if (Date.now() - startTime >= 3000) currentDelay += deceleration;
      if (currentDelay >= (preselectedWinner?.category === "A" ? 550 : 500)) {
        clearTimeout(timerId); beep(); finishAnimation(); return;
      }
      timerId = setTimeout(animate, currentDelay);
    }

    async function finishAnimation() {
      const msg = document.getElementById("resultMessage");
      if (!preselectedWinner) {
        msg.textContent = "抽選結果：当たる賞はありません。";
        document.getElementById("startBtn").style.visibility = "visible"; return;
      }
      const tiles = Array.from(document.querySelectorAll(".tile"));
      const winIdx = tiles.findIndex(t => t.dataset.id === preselectedWinner.id);
      if (winIdx < 0) return;
      clearActive(); tiles[winIdx].classList.add("active");
      await addDoc(collection(db, "history"), {
        prizeId: preselectedWinner.id, prizeName: preselectedWinner.name,
        rank: preselectedWinner.rank, timestamp: new Date()
      }).catch(console.error);
      let blink = 0;
      const iv = setInterval(() => {
        tiles[winIdx].classList.toggle("winner");
        if (++blink >= 15) {
          clearInterval(iv); tiles[winIdx].classList.add("winner");
          document.getElementById("startBtn").style.visibility = "visible";
        }
        beep();
      }, 200);
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      clearActive(); await preselectWinner();
      if (!preselectedWinner) { alert("抽選対象となる賞がありません。"); return; }
      deceleration = preselectedWinner.category === "A" ? 17 : 20;
      document.getElementById("startBtn").style.visibility = "hidden";
      currentDelay = 100; prevIndex = -1;
      document.getElementById("resultMessage").textContent = "";
      startTime = Date.now(); animate();
    });
  </script>
</body>
</html>
