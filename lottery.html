<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抽選アニメーション</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #pageTitle {
      text-align: center;
      font-size: 28px;
      margin: 20px 0;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px;
    }

    /* ─── ▼ 修正：コンテナを固定アスペクト比に ─── */
    .center-container {
      position: relative;
      margin: 0 auto;
      max-width: 600px;
      width: 100%;
      /* 縦横比を固定（縦長画像なら 2/3、横長なら 4/3 に変更） */
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #000;
    }

    /* ▼ 修正：画像をコンテナいっぱいに収める */
    #centerImage {
      width: 100%;
      height: 100%;
      object-fit: cover;   /* 比率を保ちながらコンテナを埋める */
      object-position: center;
      display: block;
    }

    /* タイル配置（上40%〜下30% → パーセント指定なので比率固定後は常に安定） */
    .prizes-overlay {
      position: absolute;
      top: 40%;
      left: 0;
      right: 0;
      bottom: 30%;
      display: grid;
      gap: 10px;
      pointer-events: none;
      padding: 10px;
      box-sizing: border-box;
      grid-template-columns: repeat(3, 1fr);
      justify-items: center;
      align-items: center;
      justify-content: center;
    }
    .tile {
      width: 97%;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border: 2px solid #aaa;
      font-size: 14px;
      font-family: 'Arial Black', Gadget, sans-serif;
      font-weight: bold;
      border-radius: 8px;
      transition: background-color 0.2s;
      background-color: rgba(255, 255, 255, 0.95);
      color: #333;
      box-sizing: border-box;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: center;
    }
    .active {
      background-color: yellow;
      border-color: orange;
    }
    .winner {
      background-color: magenta;
      border-color: red;
      color: white;
    }

    /* ─── ▼ 修正：ボタン位置をパーセント指定に ─── */
    .start-btn {
      position: absolute;
      bottom: 25%;          /* 固定px → % に変更 */
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      background-color: rgba(0, 0, 0, 0.85);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .start-btn:active {
      transform: translateX(-50%) scale(0.95);
    }

    #resultMessage {
      text-align: center;
      font-size: 20px;
      margin-top: 10px;
    }

    @media (max-width: 480px) {
      .tile { font-size: 12px; }
      .start-btn {
        width: 70px;
        height: 70px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="pageTitle"></div>

  <!-- ログインオーバーレイ -->
  <div id="loginOverlay" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); display: flex;
    align-items: center; justify-content: center; z-index: 9999;
  ">
    <div style="background: #fff; padding: 30px; border-radius: 8px; text-align: center; width: 280px;">
      <h2 style="margin-bottom: 16px;">抽選画面パスワード</h2>
      <input type="password" id="eventPasswordInput" placeholder="パスワードを入力"
        style="width:100%;padding:8px;font-size:16px;margin-bottom:12px;box-sizing:border-box;"/><br/>
      <button id="eventLoginBtn" style="padding:10px 20px;font-size:16px;cursor:pointer;">開く</button>
    </div>
  </div>

  <div id="mainContainer" style="display:none;">
    <div class="center-container" id="centerContainer">
      <img id="centerImage" src="" alt="中央画像" />
      <div id="tilesOverlay" class="prizes-overlay"></div>
      <button id="startBtn" class="start-btn">スタート</button>
    </div>
    <div id="resultMessage"></div>
  </div>

  <script type="module">
    const EVENT_PASSWORD = "3254";
    const overlay = document.getElementById("loginOverlay");
    const main    = document.getElementById("mainContainer");
    document.getElementById("eventLoginBtn").addEventListener("click", () => {
      const input = document.getElementById("eventPasswordInput").value;
      if (input === EVENT_PASSWORD) {
        overlay.style.display = "none";
        main.style.display    = "block";
      } else {
        alert("パスワードが違います");
      }
    });

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-app.js";
    import {
      getFirestore, collection, query, orderBy, onSnapshot,
      doc, getDoc, getDocs, addDoc
    } from "https://www.gstatic.com/firebasejs/9.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDggkQeswndbsRb0d0K8WOv2L3i6o4vh0",
      authDomain: "lottery2-e5aa1.firebaseapp.com",
      projectId: "lottery2-e5aa1",
      storageBucket: "lottery2-e5aa1.firebasestorage.app",
      messagingSenderId: "652760083315",
      appId: "1:652760083315:web:0a0e45eec343f403f2b306",
      measurementId: "G-D5H6XV6GHE"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // 表示設定読み込み
    async function loadDisplayConfig() {
      const snap = await getDoc(doc(db, "displaySettings", "config"));
      if (snap.exists()) {
        const d = snap.data();
        const titleElem = document.getElementById("pageTitle");
        if (d.titleVisible !== false && d.title) {
          titleElem.textContent = d.title;
          titleElem.style.display = "block";
        } else {
          titleElem.style.display = "none";
        }
        if (d.currentBgImageUrl) {
          document.body.style.backgroundImage = `url('${d.currentBgImageUrl}')`;
          document.body.style.backgroundRepeat = "repeat";
        }
        document.getElementById("centerImage").src = d.currentCenterImageUrl || "";
      }
    }
    loadDisplayConfig();

    // 賞タイル
    const tilesOverlay = document.getElementById("tilesOverlay");
    let prizesList = [];
    onSnapshot(query(collection(db, "prizes"), orderBy("rank", "asc")), snapshot => {
      prizesList = [];
      tilesOverlay.innerHTML = "";
      snapshot.forEach(s => prizesList.push({ id: s.id, ...s.data() }));
      const cols = Math.min(prizesList.length, 3);
      tilesOverlay.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      prizesList.forEach(prize => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.textContent = prize.name;
        tile.dataset.id = prize.id;
        tilesOverlay.appendChild(tile);
      });
    });

    // ビープ音
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep() {
      if (audioCtx.state === "suspended") audioCtx.resume();
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = "square";
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    let running = false, currentDelay = 100, deceleration = 20;
    let timerId, prevIndex = -1, preselectedWinner = null, startTime = 0;

    async function preselectWinner() {
      const histSnap = await getDocs(collection(db, "history"));
      const counts = {};
      histSnap.forEach(s => {
        const id = s.data().prizeId;
        counts[id] = (counts[id] || 0) + 1;
      });
      const weighted = [];
      let total = 0;
      prizesList.forEach(prize => {
        const remaining = prize.quantity - (counts[prize.id] || 0);
        if (remaining > 0) { weighted.push({ prize, weight: remaining }); total += remaining; }
      });
      if (total <= 0) { preselectedWinner = null; return; }
      let r = Math.random() * total;
      for (const item of weighted) {
        r -= item.weight;
        if (r <= 0) { preselectedWinner = item.prize; break; }
      }
    }

    function clearActive() {
      document.querySelectorAll(".tile").forEach(t => t.classList.remove("active", "winner"));
    }
    function randIdx(max, excl) {
      if (max <= 1) return 0;
      let idx;
      do { idx = Math.floor(Math.random() * max); } while (idx === excl);
      return idx;
    }

    function animate() {
      const tiles = document.querySelectorAll(".tile");
      if (!tiles.length) { running = false; return; }
      clearActive();
      const idx = randIdx(tiles.length, prevIndex);
      tiles[idx].classList.add("active");
      prevIndex = idx;
      beep();
      if (Date.now() - startTime >= 3000) currentDelay += deceleration;
      const maxD = preselectedWinner?.category === "A" ? 550 : 500;
      if (currentDelay >= maxD) {
        running = false;
        clearTimeout(timerId);
        beep();
        finishAnimation();
        return;
      }
      timerId = setTimeout(animate, currentDelay);
    }

    async function finishAnimation() {
      const msg = document.getElementById("resultMessage");
      if (!preselectedWinner) {
        msg.textContent = "抽選結果：当たる賞はありません。";
        document.getElementById("startBtn").style.visibility = "visible";
        return;
      }
      const tiles = Array.from(document.querySelectorAll(".tile"));
      const winIdx = tiles.findIndex(t => t.dataset.id === preselectedWinner.id);
      if (winIdx < 0) return;
      clearActive();
      tiles[winIdx].classList.add("active");
      await addDoc(collection(db, "history"), {
        prizeId: preselectedWinner.id,
        prizeName: preselectedWinner.name,
        rank: preselectedWinner.rank,
        timestamp: new Date()
      }).catch(console.error);
      let blink = 0;
      const interval = setInterval(() => {
        tiles[winIdx].classList.toggle("winner");
        if (++blink >= 15) {
          clearInterval(interval);
          tiles[winIdx].classList.add("winner");
          document.getElementById("startBtn").style.visibility = "visible";
        }
        beep();
      }, 200);
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      clearActive();
      await preselectWinner();
      if (!preselectedWinner) { alert("抽選対象となる賞がありません。"); return; }
      deceleration = preselectedWinner.category === "A" ? 17 : 20;
      document.getElementById("startBtn").style.visibility = "hidden";
      running = true;
      currentDelay = 100;
      prevIndex = -1;
      document.getElementById("resultMessage").textContent = "";
      startTime = Date.now();
      animate();
    });
  </script>
</body>
</html>
